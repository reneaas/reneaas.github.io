name: deploy-book

# Only run this when the main branch changes
on:
  push:
    branches:
      - main

jobs:
  deploy-book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      # Install dependencies
      - name: Set up Python 3.12.3
        uses: actions/setup-python@v2
        with:
          python-version: 3.12.3


      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Show munchboka-edutools version
        run: |
          python -c "import importlib.metadata as m; print('munchboka-edutools', m.version('munchboka-edutools'))"

      # Build the book
      - name: Build the book
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          jupyter-book clean . --all
          rm -rf _build .jupyter_cache
          jupyter-book build . --all

      # Ensure the CNAME file is preserved
      # - name: Preserve CNAME file
      #   run: |
      #     cp CNAME _build/html/ || echo "No CNAME file found in root."

      # Deploy to GitHub Pages
      - name: GitHub Pages action
        uses: peaceiris/actions-gh-pages@v3.6.1
        with:
          github_token: ${{ secrets.TOKEN }}
          publish_dir: ./_build/html
          cname: www.munchboka.no
